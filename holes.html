  </div>

  <script>
    // Select all images within elements having the class "content_grid_page"
    const images = document.querySelectorAll('.content_grid_page img');
  
    images.forEach(img => {
      img.addEventListener('click', () => {
        // Remove 'expanded' class from any currently expanded image
        const expandedImg = document.querySelector('.content_grid_page img.expanded');
        if (expandedImg && expandedImg !== img) {
          expandedImg.classList.remove('expanded');
        }
  
        // Toggle the "expanded" class for the clicked image
        img.classList.toggle('expanded');
      });
    });
  </script>
